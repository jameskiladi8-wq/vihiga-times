<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local News - Comment Section</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f8fafc;
            padding: clamp(0.5rem, 2vw, 2rem);
            min-height: 100vh;
        }

        /* Main Container - Increased size with clamp for fluid responsiveness */
        .comments-container {
            height: clamp(85vh, 90vh, 95vh);
            min-height: 600px;
            overflow-y: auto;
            background: #ffffff;
            border-radius: clamp(8px, 2vw, 16px);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            max-width: min(95vw, 1200px);
            margin: 0 auto;
            position: relative;
        }

        /* Custom Scrollbar */
        .comments-container::-webkit-scrollbar {
            width: clamp(6px, 1vw, 10px);
        }

        .comments-container::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }

        .comments-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .comments-container::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Category Banner - Local News Theme (Green) */
        .category-banner {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            color: white;
            padding: clamp(16px, 3vw, 32px);
            border-radius: clamp(8px, 2vw, 16px) clamp(8px, 2vw, 16px) 0 0;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 2px 12px rgba(5, 150, 105, 0.25);
        }

        .category-banner h2 {
            font-size: clamp(1.25rem, 3vw, 2rem);
            font-weight: 700;
            margin-bottom: clamp(6px, 1vw, 12px);
            display: flex;
            align-items: center;
            gap: clamp(6px, 1.5vw, 12px);
        }

        .category-banner h2::before {
            content: "📰";
            font-size: clamp(1.1rem, 2.5vw, 1.5rem);
        }

        .category-banner p {
            font-size: clamp(0.85rem, 1.5vw, 1.1rem);
            opacity: 0.95;
            font-weight: 400;
            line-height: 1.5;
            max-width: 600px;
        }

        /* Content Wrapper */
        .content-wrapper {
            padding: clamp(16px, 3vw, 40px);
        }

        /* Comment Form */
        .comment-form-section {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: clamp(10px, 2vw, 16px);
            padding: clamp(16px, 3vw, 32px);
            margin-bottom: clamp(24px, 4vw, 40px);
        }

        .form-title {
            font-size: clamp(1rem, 2vw, 1.25rem);
            font-weight: 600;
            color: #1e293b;
            margin-bottom: clamp(12px, 2vw, 20px);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-title::before {
            content: "💬";
            font-size: clamp(1rem, 2vw, 1.2rem);
        }

        .comment-form {
            display: flex;
            flex-direction: column;
            gap: clamp(12px, 2vw, 20px);
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: clamp(0.8rem, 1.2vw, 0.95rem);
            font-weight: 500;
            color: #475569;
            margin-bottom: 6px;
        }

        .form-input {
            padding: clamp(10px, 1.5vw, 16px) clamp(12px, 2vw, 20px);
            border: 2px solid #e2e8f0;
            border-radius: clamp(6px, 1vw, 10px);
            font-size: clamp(0.9rem, 1.5vw, 1rem);
            transition: all 0.2s ease;
            background: white;
            font-family: inherit;
            width: 100%;
        }

        .form-input:focus {
            outline: none;
            border-color: #059669;
            box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1);
        }

        textarea.form-input {
            min-height: clamp(80px, 15vh, 120px);
            resize: vertical;
        }

        .submit-btn {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            color: white;
            border: none;
            padding: clamp(12px, 2vw, 16px) clamp(20px, 3vw, 28px);
            border-radius: clamp(6px, 1vw, 10px);
            font-size: clamp(0.9rem, 1.5vw, 1.05rem);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            align-self: flex-start;
            min-width: clamp(140px, 20vw, 180px);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(5, 150, 105, 0.35);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Comments List */
        .comments-list {
            display: flex;
            flex-direction: column;
            gap: clamp(16px, 2.5vw, 24px);
        }

        .comments-header {
            font-size: clamp(1.1rem, 2.2vw, 1.4rem);
            font-weight: 700;
            color: #1e293b;
            margin-bottom: clamp(8px, 1.5vw, 16px);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .comments-header::before {
            content: "🗣️";
            font-size: clamp(1rem, 2vw, 1.3rem);
        }

        .comment-count {
            background: #059669;
            color: white;
            font-size: clamp(0.7rem, 1.2vw, 0.85rem);
            padding: clamp(2px, 0.5vw, 4px) clamp(6px, 1vw, 10px);
            border-radius: 12px;
            font-weight: 600;
        }

        /* Individual Comment */
        .comment-item {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: clamp(10px, 2vw, 14px);
            padding: clamp(16px, 2.5vw, 24px);
            transition: all 0.2s ease;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .comment-item:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            border-color: #d1d5db;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: clamp(10px, 1.5vw, 14px);
            flex-wrap: wrap;
            gap: 8px;
        }

        .comment-author {
            font-weight: 700;
            color: #059669;
            font-size: clamp(0.9rem, 1.5vw, 1.05rem);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .comment-author::before {
            content: "👤";
        }

        .comment-author.anonymous::before {
            content: "👻";
        }

        .comment-time {
            font-size: clamp(0.75rem, 1.2vw, 0.875rem);
            color: #94a3b8;
            font-weight: 500;
        }

        .comment-text {
            color: #334155;
            line-height: 1.7;
            font-size: clamp(0.9rem, 1.5vw, 1.05rem);
            margin-bottom: clamp(14px, 2vw, 18px);
            word-wrap: break-word;
        }

        /* Reaction Buttons */
        .comment-reactions {
            display: flex;
            gap: clamp(12px, 2vw, 18px);
            padding-top: clamp(10px, 1.5vw, 14px);
            border-top: 1px solid #f1f5f9;
            flex-wrap: wrap;
        }

        .reaction-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: clamp(6px, 1vw, 8px) clamp(10px, 1.5vw, 14px);
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: clamp(0.8rem, 1.2vw, 0.95rem);
            color: #64748b;
            transition: all 0.2s ease;
            user-select: none;
        }

        .reaction-btn:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
            transform: scale(1.02);
        }

        .reaction-btn.active-like {
            background: #dcfce7;
            border-color: #22c55e;
            color: #15803d;
        }

        .reaction-btn.active-dislike {
            background: #fee2e2;
            border-color: #ef4444;
            color: #b91c1c;
        }

        .reaction-btn span {
            font-weight: 600;
            min-width: 20px;
            text-align: center;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: clamp(30px, 5vw, 50px);
            color: #94a3b8;
        }

        .empty-state-icon {
            font-size: clamp(2.5rem, 5vw, 4rem);
            margin-bottom: clamp(10px, 2vw, 16px);
        }

        .empty-state-text {
            font-size: clamp(0.9rem, 1.8vw, 1.1rem);
            font-weight: 500;
        }

        /* Error Message */
        .error-message {
            background: #fef2f2;
            color: #991b1b;
            padding: clamp(12px, 2vw, 16px);
            border-radius: clamp(6px, 1vw, 10px);
            font-size: clamp(0.85rem, 1.3vw, 0.95rem);
            margin-bottom: clamp(12px, 2vw, 20px);
            display: none;
            border-left: 4px solid #ef4444;
            font-weight: 500;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Success Message */
        .success-message {
            background: #f0fdf4;
            color: #166534;
            padding: clamp(12px, 2vw, 16px);
            border-radius: clamp(6px, 1vw, 10px);
            font-size: clamp(0.85rem, 1.3vw, 0.95rem);
            margin-bottom: clamp(12px, 2vw, 20px);
            display: none;
            border-left: 4px solid #22c55e;
            font-weight: 500;
        }

        .success-message.show {
            display: block;
        }

        /* Enhanced Media Queries for Superior Responsiveness */
        
        /* Large screens - Desktop optimization */
        @media (min-width: 1400px) {
            .comments-container {
                max-width: 1000px;
            }
            
            .content-wrapper {
                padding: 40px 48px;
            }
            
            .comment-form-section {
                display: grid;
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }

        /* Standard desktop */
        @media (min-width: 1024px) and (max-width: 1399px) {
            .comments-container {
                max-width: 900px;
            }
        }

        /* Tablet landscape and small desktop */
        @media (min-width: 768px) and (max-width: 1023px) {
            .comments-container {
                max-width: 95vw;
                height: 90vh;
            }
            
            .content-wrapper {
                padding: 24px;
            }
        }

        /* Tablet portrait */
        @media (min-width: 481px) and (max-width: 767px) {
            body {
                padding: 0.5rem;
            }
            
            .comments-container {
                height: 95vh;
                border-radius: 12px;
                max-width: 100%;
            }
            
            .category-banner {
                padding: 20px;
            }
            
            .content-wrapper {
                padding: 20px;
            }
            
            .comment-form-section {
                padding: 20px;
            }
            
            .submit-btn {
                width: 100%;
                align-self: stretch;
            }
            
            .comment-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
            }
        }

        /* Mobile devices */
        @media (max-width: 480px) {
            body {
                padding: 0;
                background: #ffffff;
            }
            
            .comments-container {
                height: 100vh;
                max-width: 100%;
                border-radius: 0;
                box-shadow: none;
            }
            
            .category-banner {
                padding: 16px;
                border-radius: 0;
            }
            
            .category-banner h2 {
                font-size: 1.2rem;
            }
            
            .category-banner p {
                font-size: 0.85rem;
            }
            
            .content-wrapper {
                padding: 16px;
            }
            
            .comment-form-section {
                padding: 16px;
                margin-bottom: 20px;
            }
            
            .form-title {
                font-size: 1rem;
            }
            
            .submit-btn {
                width: 100%;
                align-self: stretch;
                padding: 14px;
            }
            
            .comment-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }
            
            .comment-reactions {
                gap: 10px;
            }
            
            .reaction-btn {
                padding: 6px 12px;
                font-size: 0.85rem;
            }
        }

        /* Small mobile devices */
        @media (max-width: 360px) {
            .category-banner h2 {
                font-size: 1.1rem;
            }
            
            .content-wrapper {
                padding: 12px;
            }
            
            .comment-form-section {
                padding: 14px;
            }
            
            .form-input {
                padding: 10px 12px;
            }
        }

        /* Landscape orientation on mobile */
        @media (max-height: 500px) and (orientation: landscape) {
            .comments-container {
                height: 100vh;
            }
            
            .category-banner {
                padding: 12px 20px;
            }
            
            textarea.form-input {
                min-height: 60px;
            }
        }

        /* High DPI / Retina displays */
        @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
            .form-input, .reaction-btn, .comment-item {
                border-width: 0.5px;
            }
        }

        /* Reduced motion preference */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Hidden form for email submission */
        .email-form {
            display: none;
        }
    </style>
</head>
<body>

    <div class="comments-container" id="commentsContainer">
        <!-- Category Banner -->
        <div class="category-banner">
            <h2>Local News Discussion</h2>
            <p>Share your thoughts and opinions about this local news story.</p>
        </div>

        <div class="content-wrapper">
            <!-- Messages -->
            <div class="error-message" id="errorMessage">Please write a comment before posting.</div>
            <div class="success-message" id="successMessage">Your comment has been posted successfully!</div>

            <!-- Comment Form -->
            <div class="comment-form-section">
                <div class="form-title">Add Your Comment</div>
                <form class="comment-form" id="commentForm">
                    <div class="form-group">
                        <label for="userName">Name</label>
                        <input 
                            type="text" 
                            id="userName" 
                            name="name" 
                            class="form-input" 
                            placeholder="Your name (optional)"
                        >
                    </div>
                    
                    <div class="form-group">
                        <label for="userComment">Comment *</label>
                        <textarea 
                            id="userComment" 
                            name="comment" 
                            class="form-input" 
                            placeholder="Write your comment..."
                            required
                        ></textarea>
                    </div>

                    <!-- Hidden fields for FormSubmit -->
                    <input type="hidden" name="Category" value="Local News">
                    <input type="hidden" name="Article ID" value="local-news-article">
                    <input type="hidden" name="_captcha" value="false">
                    <input type="hidden" name="_subject" value="New Comment on Local News Article">

                    <button type="submit" class="submit-btn" id="submitBtn">
                        <span>➤</span>
                        Post Comment
                    </button>
                </form>
            </div>

            <!-- Comments List -->
            <div class="comments-list" id="commentsList">
                <div class="comments-header">
                    Comments <span class="comment-count" id="commentCount">0</span>
                </div>
                <div id="commentsListContent">
                    <!-- Comments will be dynamically inserted here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden iframe for form submission to prevent page redirect -->
    <iframe name="hiddenFrame" id="hiddenFrame" style="display: none;"></iframe>

    <script>
        // Configuration
        const STORAGE_KEY = 'localNewsComments';
        const REACTIONS_KEY = 'localNewsReactions';
        const ARTICLE_ID = 'local-news-article';
        const FORM_ACTION = 'https://formsubmit.co/jameskiladi8@gmail.com';

        // Sample initial comments with fake engagement
        const sampleComments = [
            {
                id: 'sample-1',
                name: 'Sarah M.',
                text: 'This is really concerning news for our neighborhood. I hope the local authorities take immediate action on this issue.',
                timestamp: new Date(Date.now() - 86400000 * 2).toISOString(),
                likes: 22,
                dislikes: 4
            },
            {
                id: 'sample-2',
                name: 'Anonymous',
                text: 'I witnessed this happening yesterday near the community center. People need to be more aware of their surroundings.',
                timestamp: new Date(Date.now() - 86400000).toISOString(),
                likes: 15,
                dislikes: 2
            }
        ];

        // DOM Elements
        const commentForm = document.getElementById('commentForm');
        const commentsListContent = document.getElementById('commentsListContent');
        const commentCount = document.getElementById('commentCount');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const commentsContainer = document.getElementById('commentsContainer');

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadComments();
            setupFormHandler();
        });

        // Load comments from localStorage or initialize with samples
        function loadComments() {
            let comments = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            
            // If no comments exist, populate with samples
            if (comments.length === 0) {
                comments = [...sampleComments];
                localStorage.setItem(STORAGE_KEY, JSON.stringify(comments));
            }
            
            renderComments(comments);
        }

        // Save comment to localStorage
        function saveComment(name, text) {
            const comments = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            const newComment = {
                id: 'comment-' + Date.now(),
                name: name || 'Anonymous',
                text: text,
                timestamp: new Date().toISOString(),
                likes: 0,
                dislikes: 0
            };
            
            comments.unshift(newComment);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(comments));
            
            return newComment;
        }

        // Render all comments
        function renderComments(comments) {
            commentsListContent.innerHTML = '';
            commentCount.textContent = comments.length;

            if (comments.length === 0) {
                commentsListContent.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💬</div>
                        <div class="empty-state-text">No comments yet. Be the first to share your thoughts!</div>
                    </div>
                `;
                return;
            }

            comments.forEach(comment => {
                const commentElement = createCommentElement(comment);
                commentsListContent.appendChild(commentElement);
            });
        }

        // Create individual comment element
        function createCommentElement(comment) {
            const div = document.createElement('div');
            div.className = 'comment-item';
            div.dataset.commentId = comment.id;

            const isAnonymous = comment.name === 'Anonymous';
            const timeAgo = formatTimeAgo(comment.timestamp);
            
            // Get user's reaction state
            const reactions = JSON.parse(localStorage.getItem(REACTIONS_KEY)) || {};
            const userReaction = reactions[comment.id] || null;

            div.innerHTML = `
                <div class="comment-header">
                    <div class="comment-author ${isAnonymous ? 'anonymous' : ''}">${escapeHtml(comment.name)}</div>
                    <div class="comment-time">${timeAgo}</div>
                </div>
                <div class="comment-text">${escapeHtml(comment.text)}</div>
                <div class="comment-reactions">
                    <button class="reaction-btn ${userReaction === 'like' ? 'active-like' : ''}" data-action="like" data-comment-id="${comment.id}">
                        👍 Like <span>${comment.likes}</span>
                    </button>
                    <button class="reaction-btn ${userReaction === 'dislike' ? 'active-dislike' : ''}" data-action="dislike" data-comment-id="${comment.id}">
                        👎 Dislike <span>${comment.dislikes}</span>
                    </button>
                </div>
            `;

            // Add reaction handlers
            const likeBtn = div.querySelector('[data-action="like"]');
            const dislikeBtn = div.querySelector('[data-action="dislike"]');

            likeBtn.addEventListener('click', () => handleReaction(comment.id, 'like'));
            dislikeBtn.addEventListener('click', () => handleReaction(comment.id, 'dislike'));

            return div;
        }

        // Handle like/dislike reactions
        function handleReaction(commentId, action) {
            const reactions = JSON.parse(localStorage.getItem(REACTIONS_KEY)) || {};
            const currentReaction = reactions[commentId];
            let comments = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            
            const comment = comments.find(c => c.id === commentId);
            if (!comment) return;

            // Toggle reaction
            if (currentReaction === action) {
                // Remove reaction
                delete reactions[commentId];
                if (action === 'like') comment.likes--;
                else comment.dislikes--;
            } else {
                // Switching reactions
                if (currentReaction === 'like') comment.likes--;
                if (currentReaction === 'dislike') comment.dislikes--;
                
                // Add new reaction
                reactions[commentId] = action;
                if (action === 'like') comment.likes++;
                else comment.dislikes++;
            }

            // Save changes
            localStorage.setItem(REACTIONS_KEY, JSON.stringify(reactions));
            localStorage.setItem(STORAGE_KEY, JSON.stringify(comments));

            // Re-render
            renderComments(comments);
        }

        // Setup form submission handler
        function setupFormHandler() {
            commentForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const nameInput = document.getElementById('userName');
                const commentInput = document.getElementById('userComment');
                
                const name = nameInput.value.trim();
                const text = commentInput.value.trim();

                // Validation
                if (!text) {
                    showError('Please write a comment before posting.');
                    return;
                }

                // Hide error if exists
                hideError();

                // Save to localStorage
                const newComment = saveComment(name, text);

                // Send email via FormSubmit using fetch API (no redirect)
                sendEmailNotification(name, text);

                // Clear form
                commentInput.value = '';
                nameInput.value = '';

                // Show success message
                showSuccess();

                // Re-render comments
                const comments = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
                renderComments(comments);

                // Scroll to top of comments list
                const commentsListEl = document.getElementById('commentsList');
                commentsListEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
        }

        // Send email notification via FormSubmit using fetch (no page redirect)
        function sendEmailNotification(name, comment) {
            const formData = new FormData();
            formData.append('name', name || 'Anonymous');
            formData.append('comment', comment);
            formData.append('Category', 'Local News');
            formData.append('Article ID', 'local-news-article');
            formData.append('_captcha', 'false');
            formData.append('_subject', 'New Comment on Local News Article');

            // Use fetch to submit without redirecting
            fetch(FORM_ACTION, {
                method: 'POST',
                body: formData,
                headers: {
                    'Accept': 'application/json'
                }
            }).catch(error => {
                // Silently handle error - comment is already saved locally
                console.log('Email notification attempted');
            });
        }

        // Utility: Format timestamp to relative time
        function formatTimeAgo(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const seconds = Math.floor((now - date) / 1000);

            if (seconds < 60) return 'Just now';
            if (seconds < 3600) return `${Math.floor(seconds / 60)} minutes ago`;
            if (seconds < 86400) return `${Math.floor(seconds / 3600)} hours ago`;
            if (seconds < 604800) return `${Math.floor(seconds / 86400)} days ago`;
            
            return date.toLocaleDateString('en-US', { 
                month: 'short', 
                day: 'numeric', 
                year: 'numeric' 
            });
        }

        // Utility: Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Show error message
        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.classList.add('show');
            setTimeout(() => errorMessage.classList.remove('show'), 3000);
        }

        // Hide error message
        function hideError() {
            errorMessage.classList.remove('show');
        }

        // Show success message
        function showSuccess() {
            successMessage.classList.add('show');
            setTimeout(() => successMessage.classList.remove('show'), 3000);
        }
    </script>

</body>
</html>
