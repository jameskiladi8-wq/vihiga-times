<!-- marketplace.html - Strict 2x2 Grid Layout -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vihiga Marketplace - Buy & Sell Locally</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-600: #4b5563;
            --gray-800: #1f2937;
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --radius: 10px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            line-height: 1.5;
        }

        .header {
            background: white;
            border-bottom: 1px solid var(--gray-200);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 900px;
            margin: 0 auto;
            padding: clamp(12px, 2vw, 16px) clamp(16px, 3vw, 24px);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            font-size: clamp(18px, 3vw, 24px);
            font-weight: 700;
            color: var(--gray-800);
            text-decoration: none;
            white-space: nowrap;
        }

        .logo span { color: var(--primary); }

        .search-bar {
            flex: 1;
            position: relative;
            max-width: 400px;
        }

        .search-input {
            width: 100%;
            padding: 10px 12px 10px 36px;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            font-size: 14px;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-600);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: clamp(16px, 3vw, 24px);
        }

        .page-title {
            font-size: clamp(24px, 4vw, 32px);
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subtitle {
            color: var(--gray-600);
            margin-bottom: 24px;
            font-size: clamp(14px, 2vw, 16px);
        }

        .filters {
            background: white;
            padding: 16px;
            border-radius: var(--radius);
            margin-bottom: 24px;
            border: 1px solid var(--gray-200);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            justify-content: space-between;
        }

        .filter-btns {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 6px 12px;
            border: 1px solid var(--gray-200);
            background: white;
            border-radius: 16px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .sort-select {
            padding: 6px 12px;
            border: 1px solid var(--gray-200);
            border-radius: 6px;
            font-size: 13px;
        }

        /* Strict 2x2 Grid Layout - Always 2 columns */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: clamp(12px, 2vw, 16px);
        }

        /* Fixed height cards with clamp */
        .product-card {
            background: white;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--gray-100);
            height: clamp(280px, 45vh, 340px);
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .product-card:hover { transform: translateY(-2px); }

        /* Image fits perfectly without cropping */
        .card-image-wrapper {
            width: 100%;
            height: 50%;
            background: var(--gray-100);
            position: relative;
            overflow: hidden;
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-body {
            padding: clamp(10px, 2vw, 14px);
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        .card-title {
            font-size: clamp(13px, 2vw, 14px);
            font-weight: 600;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .card-price {
            font-size: clamp(15px, 2.5vw, 16px);
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .card-meta {
            font-size: clamp(11px, 1.5vw, 12px);
            color: var(--gray-600);
            line-height: 1.4;
        }

        .view-btn {
            width: 100%;
            padding: 8px;
            background: var(--gray-800);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 12px;
            margin-top: 8px;
            cursor: pointer;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            padding: clamp(16px, 3vw, 40px);
            overflow-y: auto;
        }

        .modal.active { display: flex; align-items: center; justify-content: center; }

        .modal-content {
            background: white;
            border-radius: var(--radius);
            width: 100%;
            max-width: clamp(300px, 95vw, 700px);
            max-height: 90vh;
            overflow: hidden;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            border: none;
            cursor: pointer;
            font-size: 20px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-body {
            display: grid;
            grid-template-columns: 1fr;
            max-height: 90vh;
            overflow-y: auto;
        }

        @media (min-width: 600px) {
            .modal-body { grid-template-columns: 1.2fr 1fr; }
        }

        .modal-image {
            width: 100%;
            height: clamp(200px, 35vh, 300px);
            object-fit: cover;
            background: var(--gray-100);
        }

        .modal-info {
            padding: clamp(20px, 3vw, 28px);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .modal-title {
            font-size: clamp(18px, 3vw, 22px);
            font-weight: 700;
            line-height: 1.3;
        }

        .modal-price {
            font-size: clamp(22px, 4vw, 26px);
            font-weight: 700;
            color: var(--primary);
        }

        .modal-desc {
            font-size: clamp(13px, 2vw, 14px);
            color: var(--gray-600);
            line-height: 1.6;
        }

        .modal-details-grid {
            display: grid;
            gap: 10px;
            font-size: 13px;
            color: var(--gray-600);
            background: var(--gray-50);
            padding: 12px;
            border-radius: 8px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }

        .btn-whatsapp {
            flex: 1;
            padding: 12px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-decoration: none;
        }

        .btn-share {
            flex: 1;
            padding: 12px;
            background: white;
            color: var(--gray-800);
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--gray-600);
            grid-column: span 2;
        }

        .results-count {
            font-size: 13px;
            color: var(--gray-600);
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">🏪 Vihiga<span>Marketplace</span></a>
            <div class="search-bar">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                </svg>
                <input type="text" class="search-input" id="searchInput" placeholder="Search products...">
            </div>
        </div>
    </header>

    <main class="container">
        <h1 class="page-title">Vihiga Marketplace</h1>
        <p class="subtitle">Buy and sell within your community. Safe, local, and convenient.</p>

        <div class="filters">
            <div class="filter-bts" id="filterBtns">
                <button class="filter-btn active" data-cat="all">All</button>
                <button class="filter-btn" data-cat="electronics">Electronics</button>
                <button class="filter-btn" data-cat="property">Property</button>
                <button class="filter-btn" data-cat="vehicles">Vehicles</button>
                <button class="filter-btn" data-cat="agriculture">Farm</button>
                <button class="filter-btn" data-cat="services">Services</button>
            </div>
            <select class="sort-select" id="sortSelect">
                <option value="newest">Newest</option>
                <option value="price-low">Price: Low-High</option>
                <option value="price-high">Price: High-Low</option>
            </select>
        </div>

        <div class="results-count" id="resultsCount">Showing all items</div>

        <div class="products-grid" id="productsGrid"></div>
    </main>

    <!-- Modal -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">×</button>
            <div class="modal-body">
                <img src="" alt="" class="modal-image" id="modalImage">
                <div class="modal-info">
                    <h2 class="modal-title" id="modalTitle"></h2>
                    <div class="modal-price" id="modalPrice"></div>
                    <p class="modal-desc" id="modalDesc"></p>
                    <div class="modal-details-grid">
                        <div>📍 Location: <span id="modalLoc"></span></div>
                        <div>🕒 Posted: <span id="modalTime"></span></div>
                        <div>🏷️ Product ID: #<span id="modalId"></span></div>
                        <div>📞 Seller: 0769882553</div>
                    </div>
                    <div class="modal-actions">
                        <a href="#" class="btn-whatsapp" id="modalWa" target="_blank">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                            Chat Now
                        </a>
                        <button class="btn-share" onclick="shareCurrentProduct()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                            Share
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const allProducts = [
            { id: 101, name: "Samsung Galaxy A54", price: 28500, priceDisplay: "KSh 28,500", category: "electronics", location: "Luanda", time: "2h ago", image: "https://images.unsplash.com/photo-1610945415295-d9bbf067e59c?w=400&h=400&fit=crop", desc: "Mint condition with box and charger. 128GB storage." },
            { id: 102, name: "iPhone 13 Pro", price: 95000, priceDisplay: "KSh 95,000", category: "electronics", location: "Mbale", time: "4h ago", image: "https://images.unsplash.com/photo-1632661674596-df8be070a5c5?w=400&h=400&fit=crop", desc: "256GB, battery health 95%, original accessories included." },
            { id: 103, name: "Land 1/4 Acre", price: 450000, priceDisplay: "KSh 450,000", category: "property", location: "Sabatia", time: "5h ago", image: "https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=400&h=400&fit=crop", desc: "Prime residential land with ready title deed near market." },
            { id: 104, name: "3 Bedroom House", price: 15000, priceDisplay: "KSh 15,000/mo", category: "property", location: "Hamisi", time: "1d ago", image: "https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=400&h=400&fit=crop", desc: "Spacious house with water and electricity. Secure compound." },
            { id: 105, name: "Toyota Probox 2015", price: 680000, priceDisplay: "KSh 680,000", category: "vehicles", location: "Chavakali", time: "1d ago", image: "https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?w=400&h=400&fit=crop", desc: "Well maintained, original paint, new tires, perfect engine." },
            { id: 106, name: "Motorbike Boxer", price: 65000, priceDisplay: "KSh 65,000", category: "vehicles", location: "Luanda", time: "2d ago", image: "https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=400&h=400&fit=crop", desc: "BM100 in good condition, logbook available." },
            { id: 107, name: "Fresh Vegetables", price: 350, priceDisplay: "KSh 350", category: "agriculture", location: "Mbale", time: "3h ago", image: "https://images.unsplash.com/photo-1566385101042-1a0aa0c1268c?w=400&h=400&fit=crop", desc: "Organic sukuma, spinach, and traditional greens. Fresh harvest." },
            { id: 108, name: "Fresh Milk 5L", price: 250, priceDisplay: "KSh 250", category: "agriculture", location: "Hamisi", time: "1h ago", image: "https://images.unsplash.com/photo-1563636619-e9143da7973b?w=400&h=400&fit=crop", desc: "Fresh cow milk from healthy dairy cows." },
            { id: 109, name: "Plumbing Services", price: 0, priceDisplay: "Negotiable", category: "services", location: "Vihiga", time: "30m ago", image: "https://images.unsplash.com/photo-1585704032915-c3400ca199e7?w=400&h=400&fit=crop", desc: "24/7 emergency plumbing, installation and repairs." },
            { id: 110, name: "Electrician", price: 500, priceDisplay: "From KSh 500", category: "services", location: "Sabatia", time: "6h ago", image: "https://images.unsplash.com/photo-1621905251189-08b45d6a269e?w=400&h=400&fit=crop", desc: "Residential and commercial electrical services, certified." },
            { id: 111, name: "HP Laptop Core i5", price: 32000, priceDisplay: "KSh 32,000", category: "electronics", location: "Chavakali", time: "3d ago", image: "https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=400&h=400&fit=crop", desc: "15-inch, 8GB RAM, 256GB SSD, Windows 11." },
            { id: 112, name: "Commercial Plot", price: 1200000, priceDisplay: "KSh 1.2M", category: "property", location: "Luanda", time: "1w ago", image: "https://images.unsplash.com/photo-1449844908441-8829872d2607?w=400&h=400&fit=crop", desc: "Prime commercial plot along main road with ready documents." }
        ];

        let currentFilter = 'all';
        let currentSort = 'newest';
        let searchQuery = '';
        let currentProduct = null;

        const grid = document.getElementById('productsGrid');
        const resultsCount = document.getElementById('resultsCount');

        function render() {
            let filtered = allProducts.filter(p => {
                const matchesCat = currentFilter === 'all' || p.category === currentFilter;
                const matchesSearch = p.name.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCat && matchesSearch;
            });

            if (currentSort === 'price-low') filtered.sort((a, b) => a.price - b.price);
            else if (currentSort === 'price-high') filtered.sort((a, b) => b.price - a.price);
            else filtered.sort((a, b) => b.id - a.id);

            resultsCount.textContent = `Showing ${filtered.length} item${filtered.length !== 1 ? 's' : ''}`;

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state">No items found</div>';
                return;
            }

            grid.innerHTML = filtered.map(p => `
                <div class="product-card" onclick="openModal(${p.id})">
                    <div class="card-image-wrapper">
                        <img src="${p.image}" alt="${p.name}" class="card-image" loading="lazy">
                    </div>
                    <div class="card-body">
                        <div>
                            <div class="card-title">${p.name}</div>
                            <div class="card-price">${p.priceDisplay}</div>
                            <div class="card-meta">📍 ${p.location} • ${p.time}</div>
                        </div>
                        <button class="view-btn" onclick="event.stopPropagation(); openModal(${p.id})">View Details</button>
                    </div>
                </div>
            `).join('');
        }

        function openModal(id) {
            currentProduct = allProducts.find(p => p.id === id);
            if (!currentProduct) return;

            document.getElementById('modalImage').src = currentProduct.image;
            document.getElementById('modalTitle').textContent = currentProduct.name;
            document.getElementById('modalPrice').textContent = currentProduct.priceDisplay;
            document.getElementById('modalDesc').textContent = currentProduct.desc;
            document.getElementById('modalLoc').textContent = currentProduct.location;
            document.getElementById('modalTime').textContent = currentProduct.time;
            document.getElementById('modalId').textContent = currentProduct.id;

            const msg = encodeURIComponent(`Hello, I saw your listing "${currentProduct.name}" (ID: ${currentProduct.id}) on Vihiga Marketplace. Is it still available?`);
            document.getElementById('modalWa').href = `https://wa.me/254769882553?text=${msg}`;

            document.getElementById('productModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('productModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        async function shareCurrentProduct() {
            if (!currentProduct) return;
            try {
                await navigator.share({
                    title: currentProduct.name,
                    text: `${currentProduct.name} - ${currentProduct.priceDisplay} on Vihiga Marketplace`,
                    url: `${window.location.origin}/marketplace.html?product=${currentProduct.id}`
                });
            } catch (e) {
                await navigator.clipboard.writeText(`${window.location.origin}/marketplace.html?product=${currentProduct.id}`);
                alert('Link copied!');
            }
        }

        // Event Listeners
        document.getElementById('filterBtns').addEventListener('click', e => {
            if (e.target.classList.contains('filter-btn')) {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.dataset.cat;
                render();
            }
        });

        document.getElementById('searchInput').addEventListener('input', e => {
            searchQuery = e.target.value;
            render();
        });

        document.getElementById('sortSelect').addEventListener('change', e => {
            currentSort = e.target.value;
            render();
        });

        document.getElementById('productModal').addEventListener('click', e => {
            if (e.target === e.currentTarget) closeModal();
        });

        // Check URL param
        const params = new URLSearchParams(window.location.search);
        const prodId = params.get('product');
        if (prodId) openModal(parseInt(prodId));

        render();
    </script>
</body>
</html>
